resources:
  pipelines:
    bronze_pipeline:
      name: "[${bundle.target}] ecom_chatbot_bronze"
      catalog: ${var.catalog}
      target: ${var.bronze_schema}
      libraries:
        - file:
            path: ../src/pipelines/bronze/bronze_ingestion.sql
      serverless: true
      continuous: false
      development: true
      photon: true
      channel: current
      permissions:
        - level: CAN_VIEW
          group_name: "users"
